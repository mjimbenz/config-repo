version: "3.9"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    container_name: zookeeper
    networks:
      - micro-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    container_name: kafka
    networks:
      - micro-net
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Listeners internos y externos
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Requerido para brokers single-node
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.1
    container_name: schema-registry
    networks:
      - micro-net
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:29092"

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    networks:
      - micro-net
    depends_on:
      - kafka
    ports:
      - "19000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092


  config-server:
    restart: on-failure:5
    container_name: config-server
    build: ./config-server
    image: config-server:latest
    ports:
      - "8888:8888"
    networks:
      - micro-net
    environment:
      SPRING_PROFILES_ACTIVE: docker

  registry-service:
    restart: on-failure:5
    container_name: registry-service
    build: ./registry-service
    image: registry-service:latest
    depends_on:
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      SPRING_APPLICATION_NAME: "registry-service"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-service:8761/eureka/"
      SONAR_TOKEN : "28805cf25e798f32ebcbeffeb4c7c89e91b63bc0"
    ports:
      - "8761:8761"
    networks:
      - micro-net

  gateway-service:
    restart: on-failure:5
    container_name: gateway-service
    build: ./gateway-service
    image: gateway-service:latest
    depends_on:
      - registry-service
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      SPRING_APPLICATION_NAME: "gateway-service"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-service:8761/eureka/"
      SONAR_TOKEN : "28805cf25e798f32ebcbeffeb4c7c89e91b63bc0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    networks:
      - micro-net

  mongo:
    container_name: mongo
    image: mongo:7.0
    networks:
      - micro-net
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  customer-service:
    restart: on-failure:5
    container_name: customer-service
    build: ./customer-service
    image: customer-service:latest
    depends_on:
      - mongo
      - config-server
      - gateway-service
      - registry-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      SPRING_APPLICATION_NAME: "customer-service"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-service:8761/eureka/"
      SPRING_DATA_MONGODB_URI: "mongodb://mongo:27017/customer-db"
      SONAR_TOKEN : "28805cf25e798f32ebcbeffeb4c7c89e91b63bc0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8085:8085"
    networks:
      - micro-net

  passive-product-service:
    restart: on-failure:5
    container_name: passive-product-service
    build: ./passive-product-service
    image: passive-product-service:latest
    depends_on:
      - mongo
      - config-server
      - registry-service
      - gateway-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      SPRING_APPLICATION_NAME: "passive-product-service"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-service:8761/eureka/"
      SONAR_TOKEN : "28805cf25e798f32ebcbeffeb4c7c89e91b63bc0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8082"
    networks:
      - micro-net

  active-product-service:
    restart: on-failure:5
    container_name: active-product-service
    build: ./active-product-service
    image: active-product-service:latest
    depends_on:
      - mongo
      - config-server
      - registry-service
      - gateway-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      SPRING_APPLICATION_NAME: "active-product-service"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-service:8761/eureka/"
      SONAR_TOKEN : "28805cf25e798f32ebcbeffeb4c7c89e91b63bc0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8083:8083"
    networks:
      - micro-net

  movement-service:
    restart: on-failure:5
    container_name: movement-service
    build: ./movement-service
    image: movement-service:latest
    depends_on:
      - mongo
      - config-server
      - registry-service
      - gateway-service
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      SPRING_APPLICATION_NAME: "movement-service"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-service:8761/eureka/"
      SONAR_TOKEN : "28805cf25e798f32ebcbeffeb4c7c89e91b63bc0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8084:8084"
    networks:
      - micro-net

networks:
  micro-net:
    driver: bridge

volumes:
  mongo-data:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs: