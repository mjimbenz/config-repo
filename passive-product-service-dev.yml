server:
  port: 8082

app:
  server:
    gateway: http://locahost:8080

spring:
  data:
    mongodb:
      auto-index-creation: true
  mongodb:
    host: locahost
    port: 27017
    database: passive-product-service-db



resilience4j:
  circuitbreaker:
    instances:
      customerService:
        slidingWindowSize: 10
        failureRateThreshold: 60
        waitDurationInOpenState: 10s

  retry:
    instances:
      customerService:
        maxAttempts: 3
        waitDuration: 500ms

  timelimiter:
    instances:
      customerService:
        timeoutDuration: 2s

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ #registry-service
