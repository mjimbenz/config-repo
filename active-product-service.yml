server:
  port: 8083

spring:
  data:
    mongodb:
      database: passive-product-test-db
      uri: mongodb://localhost:27017/active-product-service-db  #localhost



resilience4j:
  circuitbreaker:
    instances:
      customerService:
        slidingWindowSize: 10
        failureRateThreshold: 60
        waitDurationInOpenState: 10s

  retry:
    instances:
      customerService:
        maxAttempts: 3
        waitDuration: 500ms

  timelimiter:
    instances:
      customerService:
        timeoutDuration: 2s

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ #registry-service
